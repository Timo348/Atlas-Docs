name: atlas-docs

services:
  proxy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      collab:
        condition: service_healthy

  web:
    image: timo348/atlas-docs-web:${ATLAS_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${APP_URL:-http://localhost}
      NEXTAUTH_SECRET: ${AUTH_SECRET}
      AUTH_MODE: ${AUTH_MODE:-local}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      COLLAB_SECRET: ${AUTH_SECRET}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 12
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  collab:
    image: timo348/atlas-docs-collab:${ATLAS_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: collab
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "1234"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      COLLAB_SECRET: ${AUTH_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:1234/health"]
      interval: 10s
      timeout: 3s
      retries: 12
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  migrate:
    image: timo348/atlas-docs-migrate:${ATLAS_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    command: ["sh", "-c", "npx prisma migrate deploy && npm run db:seed"]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atlas}
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas} -d ${POSTGRES_DB:-atlas}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
